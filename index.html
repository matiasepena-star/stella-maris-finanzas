<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stella Maris · Gestión</title>

<style>
:root{
  --bg:#0f1115;
  --card:#171a21;
  --border:rgba(255,255,255,.08);
  --text:#e8ecf6;
  --muted:rgba(232,236,246,.55);
  --green:#44d07b;
  --red:#ff5b6b;
  --blue:#7aa2ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
  background:var(--bg);
  color:var(--text);
}
.app{padding:15px}

h1{
  font-size:14px;
  margin:0 0 15px 0;
  opacity:.8;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:15px;
  margin-bottom:15px;
}

input,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#111;
  color:var(--text);
  margin-bottom:10px;
}

button{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  background:var(--blue);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button.secondary{
  background:#333;
}

button.danger{
  background:var(--red);
}

.table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

.table td{
  padding:8px 5px;
  border-bottom:1px solid var(--border);
}

.green{color:var(--green);font-weight:600}
.red{color:var(--red);font-weight:600}
.muted{color:var(--muted)}

.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(8px);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal{
  background:#111;
  border:1px solid rgba(255,255,255,.15);
  border-radius:16px;
  padding:20px;
  width:90%;
  max-width:400px;
}

.modal h3{margin-top:0}
</style>
</head>
<body>
<div class="app">

<h1>Stella Maris · Gestión</h1>
<!-- DASHBOARD -->
<div class="card" id="dashboardCard">
  <h2 style="margin:0 0 10px 0;font-size:13px">Dashboard</h2>

  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <div style="flex:1;min-width:160px">
      <div class="muted" style="font-size:12px">Mes</div>
      <input type="month" id="dashMes">
    </div>
    <div style="display:flex;align-items:flex-end;gap:10px">
      <button class="secondary" onclick="renderDashboard()">Actualizar</button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:10px">
    <div class="card" style="margin:0">
      <div class="muted" style="font-size:12px">Ventas mes</div>
      <div id="dVentas" class="green" style="font-size:18px">$ 0</div>
    </div>
    <div class="card" style="margin:0">
      <div class="muted" style="font-size:12px">Gastos pagados mes</div>
      <div id="dGastos" class="red" style="font-size:18px">$ 0</div>
    </div>
    <div class="card" style="margin:0">
      <div class="muted" style="font-size:12px">Resultado mes</div>
      <div id="dResultado" style="font-size:18px">$ 0</div>
    </div>
  </div>

  <div style="margin-top:14px">
    <div style="display:flex;justify-content:space-between;align-items:end;gap:10px;flex-wrap:wrap">
      <div>
        <div style="font-weight:700">Saldos por método</div>
        <div class="muted" style="font-size:12px;margin-top:4px">
          Calculado = ventas - gastos pagados (histórico). Real = lo que tenés (editable, fijo).
        </div>
      </div>
      <button class="secondary" onclick="realIgualCalculado()">Real = Calculado</button>
    </div>

    <div id="tablaSaldos" style="margin-top:10px"></div>
  </div>
</div>

<!-- CARGAR VENTA -->
<div class="card">
  <h2 style="margin:0 0 10px 0;font-size:13px">Cargar Venta</h2>
  <input type="date" id="vFecha">
  <select id="vMetodo"></select>
  <input id="vMonto" inputmode="numeric" placeholder="$ 0">
  <input id="vNota" placeholder="Nota (opcional)">
  <button onclick="confirmarVenta()">Guardar venta</button>
</div>

<!-- CARGAR GASTO -->
<div class="card">
  <h2 style="margin:0 0 10px 0;font-size:13px">Cargar Gasto</h2>
  <input type="date" id="gFecha">
  <select id="gCategoria"></select>
  <select id="gSub"></select>
  <input id="gMonto" inputmode="numeric" placeholder="$ 0">
  <select id="gEstado" onchange="toggleMetodoGasto()">
    <option value="PENDIENTE">Pendiente</option>
    <option value="PAGADO">Pagado</option>
  </select>
  <select id="gMetodo"></select>
  <input id="gNota" placeholder="Nota (opcional)">
  <button class="danger" onclick="confirmarGasto()">Guardar gasto</button>
</div>

<!-- MODAL CONFIRMACIÓN -->
<div class="modal-bg" id="modalBg" onclick="cerrarModalSiAfuera(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitulo">Confirmar</h3>
    <div id="modalContenido"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:15px">
      <button class="secondary" onclick="cerrarModal()">Cancelar</button>
      <button id="modalOk" onclick="modalOk()">Guardar</button>
    </div>
  </div>
</div>
</div> <!-- /app -->

<script>
/* =========================
   STORAGE + CONFIG
========================= */
const KEY = "SM_APP_V4";
const KEY_REAL = "SM_APP_REAL_V1";

const fmt = new Intl.NumberFormat("es-AR",{maximumFractionDigits:0});

const MASTER_DEFAULT = {
  metodos: ["Efectivo","Mercado Pago","Credicoop","Provincia","Brubank","Tarjeta","Cheque"],
  categorias: {
    "Proveedores":["Juan","Pedro"],
    "Impuestos":["ARBA","AFIP"],
    "Empleados":["Sueldos"],
    "Otros":["Varios"]
  }
};

let master = structuredClone(MASTER_DEFAULT);
let movimientos = []; // {id,tipo,fecha,metodo,monto,nota,categoria,sub,estado,anulado}

function uid(){ return "m_" + Math.random().toString(16).slice(2) + "_" + Date.now(); }
function hoy(){ return new Date().toISOString().split("T")[0]; }
function thisMonth(){ return new Date().toISOString().slice(0,7); }

function save(){
  localStorage.setItem(KEY, JSON.stringify({master, movimientos}));
}
function load(){
  const raw = localStorage.getItem(KEY);
  if(!raw){
    master = structuredClone(MASTER_DEFAULT);
    movimientos = [];
    save();
    return;
  }
  try{
    const obj = JSON.parse(raw) || {};
    master = obj.master || structuredClone(MASTER_DEFAULT);
    movimientos = Array.isArray(obj.movimientos) ? obj.movimientos : [];
  }catch{
    master = structuredClone(MASTER_DEFAULT);
    movimientos = [];
    save();
  }
}

/* =========================
   MONEY helpers
========================= */
function formatARS(n){
  const val = Math.round(Number(n)||0);
  const sign = val < 0 ? "-" : "";
  const abs = Math.abs(val);
  return sign + "$ " + fmt.format(abs);
}
function parseARS(s){
  s = String(s||"").trim();
  const neg = s.includes("-") ? -1 : 1;
  const digits = s.replace(/[^\d]/g,"");
  const n = digits ? Number(digits) : 0;
  return n * neg;
}
function wireMoney(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.addEventListener("input", ()=>{
    const n = parseARS(el.value);
    if(n===0){ el.value=""; return; }
    el.value = formatARS(n);
  });
}

/* =========================
   REAL BAL (B): fijo por método
========================= */
function getReal(){
  const raw = localStorage.getItem(KEY_REAL);
  if(!raw){
    const init = {};
    master.metodos.forEach(m=>init[m]=0);
    localStorage.setItem(KEY_REAL, JSON.stringify(init));
    return init;
  }
  try{
    const obj = JSON.parse(raw)||{};
    const out = {};
    master.metodos.forEach(m=> out[m] = Math.round(obj[m] ?? 0));
    return out;
  }catch{
    const init = {};
    master.metodos.forEach(m=>init[m]=0);
    localStorage.setItem(KEY_REAL, JSON.stringify(init));
    return init;
  }
}
function setReal(obj){
  localStorage.setItem(KEY_REAL, JSON.stringify(obj));
}
function realIgualCalculado(){
  const calc = calcBalances();
  const real = {};
  master.metodos.forEach(m=> real[m] = Math.round(calc[m]||0));
  setReal(real);
  renderDashboard();
}

/* =========================
   UI fills
========================= */
function fillSelect(id, items, withBlank=false){
  const sel = document.getElementById(id);
  sel.innerHTML = "";
  if(withBlank) sel.innerHTML += `<option value="">Elegir...</option>`;
  items.forEach(x=> sel.innerHTML += `<option value="${x}">${x}</option>`);
}
function fillCats(){
  const cats = Object.keys(master.categorias);
  fillSelect("gCategoria", cats, false);
  fillSubs();
}
function fillSubs(){
  const cat = document.getElementById("gCategoria").value;
  const subs = master.categorias[cat] || [];
  fillSelect("gSub", subs, false);
}

/* =========================
   DASH calculations
========================= */
function activos(){
  return movimientos.filter(m=>!m.anulado);
}
function calcBalances(){
  const saldos = {};
  master.metodos.forEach(m=>saldos[m]=0);

  activos().forEach(m=>{
    if(m.tipo==="VENTA"){
      saldos[m.metodo] = (saldos[m.metodo]||0) + m.monto;
    }
    if(m.tipo==="GASTO" && m.estado==="PAGADO"){
      saldos[m.metodo] = (saldos[m.metodo]||0) - m.monto;
    }
  });
  return saldos;
}

function renderDashboard(){
  const mes = document.getElementById("dashMes").value || "";
  let vMes=0, gMes=0;

  activos().forEach(m=>{
    if(mes && !(m.fecha||"").startsWith(mes)) return;
    if(m.tipo==="VENTA") vMes += m.monto;
    if(m.tipo==="GASTO" && m.estado==="PAGADO") gMes += m.monto;
  });

  const res = vMes - gMes;

  document.getElementById("dVentas").textContent = formatARS(vMes);
  document.getElementById("dGastos").textContent = formatARS(gMes);

  const elRes = document.getElementById("dResultado");
  elRes.textContent = formatARS(res);
  elRes.className = (res>=0) ? "green" : "red";

  const calc = calcBalances();
  const real = getReal();

  let html = `<table class="table">
    <tr>
      <td class="muted" style="font-weight:700">Método</td>
      <td class="muted" style="font-weight:700">Calculado</td>
      <td class="muted" style="font-weight:700">Real (editable)</td>
      <td class="muted" style="font-weight:700">Dif.</td>
    </tr>`;

  master.metodos.forEach(m=>{
    const c = Math.round(calc[m]||0);
    const r = Math.round(real[m]||0);
    const dif = r - c;

    const clsC = c===0 ? "muted" : (c>0 ? "green" : "red");
    const clsD = dif===0 ? "muted" : (dif>0 ? "green" : "red");

    html += `
      <tr>
        <td style="font-weight:700">${m}</td>
        <td class="${clsC}">${formatARS(c)}</td>
        <td>
          <input
            data-metodo="${m}"
            inputmode="numeric"
            value="${formatARS(r)}"
            oninput="onRealInput(this)"
            onblur="onRealBlur(this)"
            style="margin:0"
          />
        </td>
        <td class="${clsD}">${formatARS(dif)}</td>
      </tr>
    `;
  });

  html += `</table>`;
  document.getElementById("tablaSaldos").innerHTML = html;
}

function onRealInput(inp){
  const n = parseARS(inp.value);
  if(n===0){ inp.value=""; return; }
  inp.value = formatARS(n);
}
function onRealBlur(inp){
  const metodo = inp.dataset.metodo;
  const n = parseARS(inp.value);
  const real = getReal();
  real[metodo] = Math.round(n);
  setReal(real);
  renderDashboard();
}

/* =========================
   GASTO metodo toggle
========================= */
function toggleMetodoGasto(){
  const estado = document.getElementById("gEstado").value;
  const sel = document.getElementById("gMetodo");
  const dis = estado !== "PAGADO";
  sel.disabled = dis;
  sel.style.opacity = dis ? "0.55" : "1";
}

/* =========================
   MODAL confirm logic
========================= */
let modalAction = null;

function abrirModal(titulo, html, actionFn){
  document.getElementById("modalTitulo").textContent = titulo;
  document.getElementById("modalContenido").innerHTML = html;
  modalAction = actionFn;
  document.getElementById("modalBg").style.display = "flex";
}
function cerrarModal(){
  document.getElementById("modalBg").style.display = "none";
  modalAction = null;
}
function cerrarModalSiAfuera(ev){
  if(ev.target.id==="modalBg") cerrarModal();
}
function modalOk(){
  if(typeof modalAction === "function") modalAction();
}

/* =========================
   SAVE actions
========================= */
function confirmarVenta(){
  const fecha = document.getElementById("vFecha").value || hoy();
  const metodo = document.getElementById("vMetodo").value;
  const monto = parseARS(document.getElementById("vMonto").value);
  const nota = (document.getElementById("vNota").value || "").trim();

  if(!metodo) return alert("Elegí método");
  if(!monto || monto<=0) return alert("Monto inválido");

  abrirModal("Confirmar venta", `
    <div class="muted">Fecha</div><div style="font-weight:700">${fecha}</div><br>
    <div class="muted">Método</div><div style="font-weight:700">${metodo}</div><br>
    <div class="muted">Monto</div><div class="green" style="font-weight:800;font-size:18px">${formatARS(monto)}</div><br>
    <div class="muted">Nota</div><div style="font-weight:700">${nota||"-"}</div>
  `, ()=>{
    movimientos.push({id:uid(), tipo:"VENTA", fecha, metodo, monto, nota, anulado:false});
    save();
    document.getElementById("vMonto").value="";
    document.getElementById("vNota").value="";
    cerrarModal();
    renderDashboard();
  });
}

function confirmarGasto(){
  const fecha = document.getElementById("gFecha").value || hoy();
  const categoria = document.getElementById("gCategoria").value;
  const sub = document.getElementById("gSub").value;
  const monto = parseARS(document.getElementById("gMonto").value);
  const estado = document.getElementById("gEstado").value;
  const metodo = document.getElementById("gMetodo").value;
  const nota = (document.getElementById("gNota").value || "").trim();

  if(!categoria || !sub) return alert("Elegí categoría y subcategoría");
  if(!monto || monto<=0) return alert("Monto inválido");
  if(estado==="PAGADO" && !metodo) return alert("Si es pagado, elegí método");

  abrirModal("Confirmar gasto", `
    <div class="muted">Fecha</div><div style="font-weight:700">${fecha}</div><br>
    <div class="muted">Categoría</div><div style="font-weight:700">${categoria} · ${sub}</div><br>
    <div class="muted">Estado</div><div style="font-weight:700">${estado}</div><br>
    <div class="muted">Método</div><div style="font-weight:700">${estado==="PAGADO" ? metodo : "-"}</div><br>
    <div class="muted">Monto</div><div class="red" style="font-weight:800;font-size:18px">${formatARS(monto)}</div><br>
    <div class="muted">Nota</div><div style="font-weight:700">${nota||"-"}</div>
  `, ()=>{
    movimientos.push({id:uid(), tipo:"GASTO", fecha, categoria, sub, estado, metodo: estado==="PAGADO" ? metodo : "", monto, nota, anulado:false});
    save();
    document.getElementById("gMonto").value="";
    document.getElementById("gNota").value="";
    cerrarModal();
    renderDashboard();
  });
}

/* =========================
   INIT
========================= */
function init(){
  load();

  document.getElementById("dashMes").value = thisMonth();

  document.getElementById("vFecha").value = hoy();
  document.getElementById("gFecha").value = hoy();

  fillSelect("vMetodo", master.metodos, false);
  fillSelect("gMetodo", master.metodos, false);

  fillCats();
  document.getElementById("gCategoria").addEventListener("change", fillSubs);

  toggleMetodoGasto();

  wireMoney("vMonto");
  wireMoney("gMonto");

  // asegurar real keys
  const real = getReal();
  master.metodos.forEach(m=>{ if(real[m]===undefined) real[m]=0; });
  setReal(real);

  renderDashboard();
}
init();
</script>

</body>
</html>
