<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stella Maris · Gestión Empresarial</title>

<style>
:root{
--bg:#f4f6f9;
--header:#0d47a1;
--nav:#1565c0;
--navHover:#0b3c8a;
--card:#ffffff;
--line:#e5e7eb;
--text:#111827;
--muted:#6b7280;
--ok:#16a34a;
--bad:#dc2626;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
color:var(--text);
}

header{
background:var(--header);
color:white;
padding:15px;
font-weight:bold;
}

nav{
display:flex;
flex-wrap:wrap;
background:var(--nav);
}

nav button{
flex:1;
min-width:120px;
border:0;
background:var(--nav);
color:white;
padding:12px;
cursor:pointer;
font-size:14px;
}

nav button:hover{
background:var(--navHover);
}

nav button.active{
background:#08307a;
font-weight:bold;
}

.section{
display:none;
flex:1;
padding:15px;
overflow:auto;
}

.section.active{
display:block;
}

.card{
background:var(--card);
padding:15px;
border-radius:10px;
margin-bottom:15px;
border:1px solid var(--line);
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border:1px solid var(--line);
border-radius:6px;
}

button.action{
background:var(--nav);
color:white;
border:0;
padding:10px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border-bottom:1px solid var(--line);
padding:8px;
text-align:left;
}

th{
background:#f1f5f9;
}

.green{color:var(--ok);font-weight:bold}
.red{color:var(--bad);font-weight:bold}
</style>
</head>
<body>

<header>
Stella Maris · Gestión Empresarial
</header>

<nav>
<button class="active" onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('ventas')">Ventas</button>
<button onclick="mostrar('gastos')">Gastos</button>
<button onclick="mostrar('transferencias')">Transferencias</button>
<button onclick="mostrar('pendientes')">Pendientes</button>
</nav>

<div id="dashboard" class="section active">
<div class="card">
<h3>Resumen General</h3>
<div>Ventas: <span id="totalVentas" class="green">$0</span></div>
<div>Egresos pagados: <span id="totalGastos" class="red">$0</span></div>
<div>Pendiente total: <span id="totalPendiente" class="red">$0</span></div>
<div>Disponible total: <span id="saldoTotal">$0</span></div>
</div>

<div class="card">
<h3>Saldos por método</h3>
<div id="saldosMetodos"></div>
</div>
</div>

<div id="ventas" class="section">
<div class="card">
<h3>Nueva Venta</h3>
<input type="number" id="ventaMonto" placeholder="Monto">
<select id="ventaMetodo"></select>
<button class="action" onclick="guardarVenta()">Guardar Venta</button>
</div>

<div class="card">
<h3>Listado de Ventas</h3>
<div id="listaVentas"></div>
</div>
</div>

<div id="gastos" class="section">
<div class="card">
<h3>Nuevo Gasto</h3>
<input type="text" id="gastoProveedor" placeholder="Proveedor">
<input type="number" id="gastoMonto" placeholder="Monto">
<select id="gastoMetodo"></select>
<select id="gastoEstado">
<option value="PENDIENTE">Pendiente</option>
<option value="PAGADO">Pagado</option>
</select>
<button class="action" onclick="guardarGasto()">Guardar Gasto</button>
</div>

<div class="card">
<h3>Listado de Gastos</h3>
<div id="listaGastos"></div>
</div>
</div>

<div id="transferencias" class="section">
<div class="card">
<h3>Nueva Transferencia</h3>
<select id="desdeMetodo"></select>
<select id="haciaMetodo"></select>
<input type="number" id="transferMonto" placeholder="Monto">
<button class="action" onclick="guardarTransferencia()">Guardar Transferencia</button>
</div>
</div>

<div id="pendientes" class="section">
<div class="card">
<h3>Pendientes por Proveedor</h3>
<div id="listaPendientes"></div>
</div>
</div>

<script>
const STORAGE_KEY = "stella_maris_sistema_v3";

let medios = ["Efectivo","Mercado Pago","Brubank","Provincia","Credicoop","Cheque"];
let ventas = [];
let gastos = [];
let transferencias = [];

function guardarLocal(){
localStorage.setItem(STORAGE_KEY, JSON.stringify({ventas,gastos,transferencias}));
}

function cargarLocal(){
let data = localStorage.getItem(STORAGE_KEY);
if(data){
let obj = JSON.parse(data);
ventas = obj.ventas || [];
gastos = obj.gastos || [];
transferencias = obj.transferencias || [];
}
}

function mostrar(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
}

function iniciar(){
cargarLocal();
let selects = ["ventaMetodo","gastoMetodo","desdeMetodo","haciaMetodo"];
selects.forEach(id=>{
let sel = document.getElementById(id);
sel.innerHTML="";
medios.forEach(m=>{
let op=document.createElement("option");
op.value=m;
op.textContent=m;
sel.appendChild(op);
});
});
renderTodo();
}

function guardarVenta(){
let monto = parseFloat(document.getElementById("ventaMonto").value);
let metodo = document.getElementById("ventaMetodo").value;
if(!monto) return;
ventas.push({monto,metodo});
document.getElementById("ventaMonto").value="";
guardarLocal();
renderTodo();
}

function guardarGasto(){
let proveedor = document.getElementById("gastoProveedor").value;
let monto = parseFloat(document.getElementById("gastoMonto").value);
let metodo = document.getElementById("gastoMetodo").value;
let estado = document.getElementById("gastoEstado").value;
if(!monto || !proveedor) return;
gastos.push({proveedor,monto,metodo,estado});
document.getElementById("gastoProveedor").value="";
document.getElementById("gastoMonto").value="";
guardarLocal();
renderTodo();
}

function guardarTransferencia(){
let desde = document.getElementById("desdeMetodo").value;
let hacia = document.getElementById("haciaMetodo").value;
let monto = parseFloat(document.getElementById("transferMonto").value);
if(!monto || desde===hacia) return;
transferencias.push({desde,hacia,monto});
document.getElementById("transferMonto").value="";
guardarLocal();
renderTodo();
}

function calcularSaldos(){
let saldos={};
medios.forEach(m=>saldos[m]=0);

ventas.forEach(v=>{
saldos[v.metodo]+=v.monto;
});

gastos.forEach(g=>{
if(g.estado==="PAGADO"){
saldos[g.metodo]-=g.monto;
}
});

transferencias.forEach(t=>{
saldos[t.desde]-=t.monto;
saldos[t.hacia]+=t.monto;
});

return saldos;
}

function renderTodo(){

let totalVentas = ventas.reduce((a,b)=>a+b.monto,0);
let totalGastos = gastos.filter(g=>g.estado==="PAGADO").reduce((a,b)=>a+b.monto,0);
let totalPendiente = gastos.filter(g=>g.estado==="PENDIENTE").reduce((a,b)=>a+b.monto,0);

let saldos = calcularSaldos();
let saldoTotal = Object.values(saldos).reduce((a,b)=>a+b,0);

document.getElementById("totalVentas").innerText="$"+totalVentas;
document.getElementById("totalGastos").innerText="$"+totalGastos;
document.getElementById("totalPendiente").innerText="$"+totalPendiente;
document.getElementById("saldoTotal").innerText="$"+saldoTotal;

let html="";
for(let m in saldos){
html+=m+": $"+saldos[m]+"<br>";
}
document.getElementById("saldosMetodos").innerHTML=html;

document.getElementById("listaVentas").innerHTML=
ventas.map(v=>"$"+v.monto+" - "+v.metodo).join("<br>");

document.getElementById("listaGastos").innerHTML=
gastos.map(g=>g.proveedor+" - $"+g.monto+" - "+g.estado).join("<br>");

let pendientesAgrupados={};
gastos.filter(g=>g.estado==="PENDIENTE").forEach(g=>{
if(!pendientesAgrupados[g.proveedor]) pendientesAgrupados[g.proveedor]=0;
pendientesAgrupados[g.proveedor]+=g.monto;
});

let htmlPend="";
for(let p in pendientesAgrupados){
htmlPend+=p+" - $"+pendientesAgrupados[p]+"<br>";
}
document.getElementById("listaPendientes").innerHTML=htmlPend;

}

iniciar();
</script>

</body>
</html>
