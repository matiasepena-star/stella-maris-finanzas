<script>
const STORAGE_ALL  = "SM_APP_ALL_V7";
const STORAGE_REAL = "SM_APP_REAL_SALDOS_V3";

const fmtMoney = new Intl.NumberFormat("es-AR",{maximumFractionDigits:0});

const DEFAULT_MASTER = {
  metodos: ["Efectivo","Mercado Pago","Credicoop","Provincia","Brubank","Tarjeta","Cheque"],
  categorias: {
    "Proveedores":["Juan","Pedro"],
    "Impuestos":["ARBA","AFIP"],
    "Empleados":["Sueldos"],
    "Otros":["Varios"]
  }
};

let master = structuredClone(DEFAULT_MASTER);
let movimientos = [];
let pendingConfirmAction = null;

const HOME_TILES = [
  { id:"dashboard",   title:"Dashboard",          sub:"Totales + saldos", icon:"📊", cls:"",       size:"l"},
  { id:"ventasCarga", title:"Cargar Ventas",      sub:"Venta directa",    icon:"➕", cls:"green",  size:"w"},
  { id:"ventasHist",  title:"Historial Ventas",   sub:"Mes / método",     icon:"🧠", cls:"green",  size:"s"},
  { id:"gastosCarga", title:"Cargar Gastos",      sub:"Pagado/Pendiente", icon:"➖", cls:"red",    size:"w"},
  { id:"pendientes",  title:"Pendientes",         sub:"Saldo final",      icon:"🧾", cls:"purple", size:"s"},
  { id:"traspaso",    title:"Traspaso",           sub:"Entre cuentas",    icon:"🔁", cls:"",       size:"s"},
  { id:"movHist",     title:"Movimientos",        sub:"Lista completa",   icon:"📋", cls:"",       size:"w"},
  { id:"maestros",    title:"Maestros",           sub:"Métodos + Listas", icon:"⚙️", cls:"",       size:"w"},
];

const crumbs = {
  home:"Home", dashboard:"Dashboard",
  ventasCarga:"Cargar Ventas", ventasHist:"Historial Ventas",
  gastosCarga:"Cargar Gastos", traspaso:"Traspaso",
  movHist:"Movimientos", pendientes:"Pendientes",
  maestros:"Maestros"
};

const CHEQUE_METHOD = "Cheque"; // ✅ Cheque = pago emitido (NO saldo disponible)

function hoy(){ return new Date().toISOString().split("T")[0]; }
function thisMonth(){ return new Date().toISOString().slice(0,7); }
function uid(){ return "m_" + Math.random().toString(16).slice(2) + "_" + Date.now(); }
function round0(n){ return Math.round(Number(n)||0); }
function activos(){ return movimientos.filter(m=>!m.anulado); }

function toast(msg="OK"){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ t.style.display="none"; }, 1100);
}

function formatARS(n){
  const val = round0(n);
  const sign = val < 0 ? "-" : "";
  const abs = Math.abs(val);
  return sign + "$ " + fmtMoney.format(abs);
}
function parseARS(str){
  const s = String(str||"").trim();
  const neg = s.includes("-") ? -1 : 1;
  const digits = s.replace(/[^\d]/g,"");
  const n = digits ? Number(digits) : 0;
  return n * neg;
}
function wireMoneyInput(el){
  if(!el) return;
  const apply = ()=>{
    const n = parseARS(el.value);
    el.dataset.raw = String(n);
    el.value = (n!==0) ? formatARS(n) : "";
  };
  el.addEventListener("input", ()=>{
    const n = parseARS(el.value);
    el.dataset.raw = String(n);
    if(n===0){ el.value = ""; return; }
    el.value = formatARS(n);
  });
  el.addEventListener("blur", apply);
  apply();
}

function saveAll(){
  localStorage.setItem(STORAGE_ALL, JSON.stringify({ master, movimientos }));
}
function loadAll(){
  const data = localStorage.getItem(STORAGE_ALL);
  if(data){
    try{
      const obj = JSON.parse(data) || {};
      master = obj.master || structuredClone(DEFAULT_MASTER);
      movimientos = Array.isArray(obj.movimientos) ? obj.movimientos : [];
      return;
    }catch{}
  }
  master = structuredClone(DEFAULT_MASTER);
  movimientos = [];
  saveAll();
}

// ✅ Métodos que SÍ cuentan como saldo disponible en Dashboard
function metodosBalance(){
  return (master.metodos||[]).filter(m => m !== CHEQUE_METHOD);
}
// ✅ Métodos válidos para cobrar ventas (Cheque no)
function metodosVentas(){
  return (master.metodos||[]).filter(m => m !== CHEQUE_METHOD);
}
// ✅ Métodos válidos para traspasos (Cheque no)
function metodosTraspaso(){
  return (master.metodos||[]).filter(m => m !== CHEQUE_METHOD);
}

function getRealSaldos(){
  const raw = localStorage.getItem(STORAGE_REAL);
  let obj = {};
  if(raw){ try{ obj = JSON.parse(raw)||{}; }catch{ obj={}; } }
  const out = {};
  metodosBalance().forEach(m=> out[m] = round0(obj[m] ?? 0));
  return out;
}
function setRealSaldos(obj){
  localStorage.setItem(STORAGE_REAL, JSON.stringify(obj));
}

function go(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  const el = document.getElementById(id);
  if(el) el.classList.add("active");
  document.getElementById("crumb").textContent = crumbs[id] || id;

  if(id==="home") renderHome();
  if(id==="dashboard") renderDashboard();
  if(id==="pendientes") renderPendientes(true);
  if(id==="ventasHist") renderVentasHist();
  if(id==="movHist") renderMovHist();
  if(id==="maestros") renderMaestros(true);
}
function goHome(){ go("home"); }

function renderHome(){
  const grid = document.getElementById("homeGrid");
  grid.innerHTML = "";
  HOME_TILES.forEach(t=>{
    const tile = document.createElement("div");
    const sizeClass = t.size==="l" ? "size-l" : (t.size==="w" ? "size-w" : "size-s");
    tile.className = `card tile ${t.cls||""} ${sizeClass}`;
    tile.innerHTML = `
      <div class="tIcon">${t.icon}</div>
      <div class="tTitle">${t.title}</div>
      <div class="tSub">${t.sub}</div>`;
    tile.addEventListener("click", ()=>go(t.id));
    grid.appendChild(tile);
  });
}

function fillSelectOptions(sel, items, includeAll=false, allLabel="Todos"){
  sel.innerHTML = "";
  if(includeAll) sel.innerHTML += `<option value="ALL">${allLabel}</option>`;
  items.forEach(x=> sel.innerHTML += `<option value="${x}">${x}</option>`);
}

function refreshSelects(){
  // ✅ Ventas (sin Cheque)
  fillSelectOptions(document.getElementById("vMetodo"), metodosVentas(), false);
  fillSelectOptions(document.getElementById("vhMetodo"), metodosVentas(), true, "Todos");

  // ✅ Gastos (Cheque permitido porque es pago emitido)
  fillSelectOptions(document.getElementById("gMetodo"), master.metodos, false);
  const cats = Object.keys(master.categorias);
  fillSelectOptions(document.getElementById("gCat"), cats, false);
  fillSelectOptions(document.getElementById("pCat"), cats, true, "Todas");
  cargarSubDeGasto();
  toggleMetodoGasto();

  // ✅ Traspaso (sin Cheque)
  fillSelectOptions(document.getElementById("tDesde"), metodosTraspaso(), false);
  fillSelectOptions(document.getElementById("tHacia"), metodosTraspaso(), false);

  // ✅ Movimientos (filtro método: incluye Cheque para poder filtrar pagos con cheque)
  fillSelectOptions(document.getElementById("mhMetodo"), master.metodos, true, "Todos");

  // Maestros
  fillSelectOptions(document.getElementById("mCatSelect"), Object.keys(master.categorias), false);
}

function cargarSubDeGasto(){
  const cat = document.getElementById("gCat").value;
  const subs = master.categorias[cat] || [];
  fillSelectOptions(document.getElementById("gSub"), subs, false);
}
function toggleMetodoGasto(){
  const estado = document.getElementById("gEstado").value;
  const selMetodo = document.getElementById("gMetodo");
  const disabled = (estado !== "PAGADO");
  selMetodo.disabled = disabled;
  selMetodo.style.opacity = disabled ? "0.55" : "1";
}

/* =======================
   MODAL
======================= */
function abrirModal(title, bodyHtml, confirmLabel="Guardar"){
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = bodyHtml;
  document.getElementById("modalFoot").innerHTML = `
    <button class="btn" onclick="cerrarModal()">Cancelar</button>
    <button class="btn primary" onclick="modalGuardar()">${confirmLabel}</button>`;
  document.getElementById("modalBack").style.display="block";
}
function modalClickOutside(ev){ if(ev.target.id==="modalBack") cerrarModal(); }
function cerrarModal(){ pendingConfirmAction=null; document.getElementById("modalBack").style.display="none"; }

function abrirConfirm(title, lines, confirmLabel="Confirmar"){
  const body = `
    <div class="panel" style="margin:0; background: rgba(0,0,0,.28); border-color: rgba(255,255,255,.14)">
      <div style="font-weight:1100;font-size:13px">${title}</div>
      <div class="hr"></div>
      ${lines.map(l=>`<div style="margin:8px 0"><span class="muted">${l.k}:</span> <span style="font-weight:1100">${l.v}</span></div>`).join("")}
    </div>
  `;
  abrirModal("Confirmar", body, confirmLabel);
}
function modalGuardar(){
  if(typeof pendingConfirmAction === "function"){
    const fn = pendingConfirmAction; pendingConfirmAction=null; fn(); return;
  }
  cerrarModal();
}
/* =======================
   GUARDAR MOVS
======================= */
function confirmarYGuardarVenta(){
  const fecha = (document.getElementById("vFecha").value || hoy());
  const metodo = document.getElementById("vMetodo").value;
  const monto = parseARS(document.getElementById("vMonto").value);
  const nota = (document.getElementById("vNota").value || "").trim();
  if(!monto || monto<=0) return toast("Monto inválido");
  if(!metodo) return toast("Falta método");

  pendingConfirmAction = () => {
    movimientos.push({ id:uid(), anulado:false, tipo:"VENTA", fecha, metodo, monto, nota });
    saveAll();
    document.getElementById("vMonto").value = "";
    document.getElementById("vNota").value = "";
    toast("Venta guardada ✅");
    cerrarModal();
    renderDashboard();
    renderVentasHist();
    renderMovHist();
  };

  abrirConfirm("Venta", [
    {k:"Fecha", v:fecha},
    {k:"Método", v:metodo},
    {k:"Monto", v: formatARS(monto)},
    {k:"Nota", v: nota || "-"}
  ], "Guardar");
}

function confirmarYGuardarGasto(){
  const fecha = (document.getElementById("gFecha").value || hoy());
  const categoria = document.getElementById("gCat").value;
  const subcategoria = document.getElementById("gSub").value;
  const monto = parseARS(document.getElementById("gMonto").value);
  const estado = document.getElementById("gEstado").value;
  const metodo = document.getElementById("gMetodo").value;
  const nota = (document.getElementById("gNota").value || "").trim();

  if(!monto || monto<=0) return toast("Monto inválido");
  if(!categoria || !subcategoria) return toast("Falta categoría/subcategoría");
  if(estado==="PAGADO" && !metodo) return toast("Pagado sin método no");

  pendingConfirmAction = () => {
    movimientos.push({
      id:uid(), anulado:false, tipo:"GASTO", fecha,
      categoria, subcategoria, monto, estado,
      metodo:(estado==="PAGADO"?metodo:""), nota
    });
    saveAll();
    document.getElementById("gMonto").value = "";
    document.getElementById("gNota").value = "";
    toast("Gasto guardado ✅");
    cerrarModal();
    renderDashboard();
    renderPendientes(false);
    renderMovHist();
  };

  abrirConfirm("Gasto", [
    {k:"Fecha", v:fecha},
    {k:"Categoría", v:categoria},
    {k:"Subcategoría", v:subcategoria},
    {k:"Estado", v:estado},
    {k:"Método", v: estado==="PAGADO" ? metodo : "-"},
    {k:"Monto", v: formatARS(monto)},
    {k:"Nota", v: nota || "-"}
  ], "Guardar");
}

function confirmarYGuardarTraspaso(){
  const fecha = (document.getElementById("tFecha").value || hoy());
  const desde = document.getElementById("tDesde").value;
  const hacia = document.getElementById("tHacia").value;
  const monto = parseARS(document.getElementById("tMonto").value);
  const nota = (document.getElementById("tNota").value || "").trim();

  if(!monto || monto<=0) return toast("Monto inválido");
  if(!desde || !hacia) return toast("Falta desde/hacia");
  if(desde===hacia) return toast("Desde y Hacia no pueden ser iguales");

  pendingConfirmAction = () => {
    movimientos.push({
      id:uid(), anulado:false, tipo:"TRASPASO", fecha,
      desde, hacia, monto, nota
    });
    saveAll();
    document.getElementById("tMonto").value = "";
    document.getElementById("tNota").value = "";
    toast("Traspaso guardado ✅");
    cerrarModal();
    renderDashboard();
    renderMovHist();
  };

  abrirConfirm("Traspaso", [
    {k:"Fecha", v:fecha},
    {k:"Desde", v:desde},
    {k:"Hacia", v:hacia},
    {k:"Monto", v: formatARS(monto)},
    {k:"Nota", v: nota || "-"}
  ], "Guardar");
}

function deshacerUltimo(){
  const last = movimientos[movimientos.length-1];
  if(!last) return toast("No hay nada para deshacer");
  if(!confirm(`¿Deshacer el último?\n${last.tipo} · ${last.fecha} · ${formatARS(last.monto)}`)) return;
  movimientos.pop();
  saveAll();
  toast("Deshecho ✅");
  renderDashboard();
  renderPendientes(false);
  renderVentasHist();
  renderMovHist();
}

/* =======================
   PENDIENTES
======================= */
function computePendientesMap(){
  const cats = Object.keys(master.categorias);
  const map = {};
  cats.forEach(cat=>{
    map[cat] = {};
    (master.categorias[cat]||[]).forEach(sub=>{ map[cat][sub]=0; });
  });

  activos().forEach(m=>{
    if(m.tipo!=="GASTO") return;
    const cat = m.categoria, sub = m.subcategoria;
    if(!cat || !sub) return;
    if(!map[cat]) map[cat]={};
    if(map[cat][sub]===undefined) map[cat][sub]=0;

    if(m.estado==="PENDIENTE") map[cat][sub] += m.monto;
    if(m.estado==="PAGADO") map[cat][sub] -= m.monto;
  });

  return map;
}

function renderPendientes(resetScroll){
  const catSel = document.getElementById("pCat")?.value || "ALL";
  const buscar = (document.getElementById("pBuscar")?.value || "").trim().toLowerCase();
  const pendMap = computePendientesMap();

  let rows = [];
  Object.keys(pendMap).forEach(cat=>{
    if(catSel!=="ALL" && cat!==catSel) return;
    const subs = pendMap[cat] || {};
    Object.keys(subs).forEach(sub=>{
      const saldo = round0(subs[sub]||0);
      const hay = `${cat} ${sub}`.toLowerCase();
      if(buscar && !hay.includes(buscar)) return;
      rows.push({cat, sub, saldo});
    });
  });

  rows.sort((a,b)=> a.cat!==b.cat ? a.cat.localeCompare(b.cat,"es") : a.sub.localeCompare(b.sub,"es"));

  let html = `<table class="table"><tr><th>Categoría</th><th>Item</th><th>Saldo</th></tr>`;
  rows.forEach(r=>{
    const cls = r.saldo===0 ? "muted" : (r.saldo>0 ? "badTxt" : "goodTxt");
    html += `<tr>
      <td style="font-weight:1100">${r.cat}</td>
      <td>${r.sub}</td>
      <td class="${cls}" style="font-weight:1100">${formatARS(r.saldo)}</td>
    </tr>`;
  });
  html += `</table>`;
  document.getElementById("tablaPendientes").innerHTML = html;

  if(resetScroll){
    const sb = document.querySelector("#pendientes .sectionBody");
    if(sb) sb.scrollTop = 0;
  }
}

/* =======================
   HISTORIAL VENTAS
======================= */
function renderVentasHist(){
  const mes = document.getElementById("vhMes").value;
  const metodo = document.getElementById("vhMetodo").value || "ALL";
  const buscar = (document.getElementById("vhBuscar").value || "").trim().toLowerCase();

  let rows=[], total=0;
  movimientos.forEach(m=>{
    if(m.tipo!=="VENTA") return;
    if(mes && !(m.fecha||"").startsWith(mes)) return;
    if(metodo!=="ALL" && m.metodo!==metodo) return;
    const hay = `${m.metodo||""} ${m.nota||""}`.toLowerCase();
    if(buscar && !hay.includes(buscar)) return;

    if(!m.anulado) total += m.monto;
    rows.push(m);
  });

  rows.sort((a,b)=> a.fecha>b.fecha ? -1 : a.fecha<b.fecha ? 1 : (a.id>b.id ? -1 : 1));
  document.getElementById("vhTotal").textContent = formatARS(total);

  let html = `<table class="table"><tr><th>Fecha</th><th>Método</th><th>Nota</th><th>Monto</th></tr>`;
  rows.forEach(m=>{
    html += `<tr class="${m.anulado?'rowAnulada':''}">
      <td>${m.fecha}</td>
      <td style="font-weight:1100">${m.metodo||""}</td>
      <td class="muted">${m.nota||""}</td>
      <td class="goodTxt">${formatARS(m.monto)}</td>
    </tr>`;
  });
  html += `</table>`;
  document.getElementById("tablaVentasHist").innerHTML = html;
}

/* =======================
   HISTORIAL MOVIMIENTOS
======================= */
function renderMovHist(){
  const mes = document.getElementById("mhMes").value;
  const tipo = document.getElementById("mhTipo").value || "ALL";
  const metodo = document.getElementById("mhMetodo").value || "ALL";
  const buscar = (document.getElementById("mhBuscar").value || "").trim().toLowerCase();

  let rows = movimientos.slice();

  rows = rows.filter(m=>{
    if(mes && !(m.fecha||"").startsWith(mes)) return false;
    if(tipo!=="ALL" && m.tipo!==tipo) return false;

    if(metodo!=="ALL"){
      if(m.tipo==="VENTA" && m.metodo!==metodo) return false;
      if(m.tipo==="GASTO"){
        if(m.estado!=="PAGADO") return false;
        if((m.metodo||"")!==metodo) return false;
      }
      if(m.tipo==="TRASPASO"){
        if(m.desde!==metodo && m.hacia!==metodo) return false;
      }
    }

    const hay = `${m.tipo} ${m.metodo||""} ${m.categoria||""} ${m.subcategoria||""} ${m.estado||""} ${m.desde||""} ${m.hacia||""} ${m.nota||""}`.toLowerCase();
    if(buscar && !hay.includes(buscar)) return false;

    return true;
  });

  rows.sort((a,b)=> a.fecha>b.fecha ? -1 : a.fecha<b.fecha ? 1 : (a.id>b.id ? -1 : 1));

  let html = `<table class="table"><tr><th>Fecha</th><th>Tipo</th><th>Detalle</th><th>Monto</th></tr>`;
  rows.forEach(m=>{
    let det = "";
    let montoCls = "muted";

    if(m.tipo==="VENTA"){
      det = `<span style="font-weight:1100">${m.metodo}</span>${m.nota?` · <span class="muted">${m.nota}</span>`:""}`;
      montoCls = "goodTxt";
    }else if(m.tipo==="GASTO"){
      det = `<span style="font-weight:1100">${m.categoria}</span> · ${m.subcategoria} · ${m.estado}${m.estado==="PAGADO" ? ` · <span style="font-weight:1100">${m.metodo}</span>`:""}${m.nota?` · <span class="muted">${m.nota}</span>`:""}`;
      montoCls = "badTxt";
    }else if(m.tipo==="TRASPASO"){
      det = `<span style="font-weight:1100">${m.desde}</span> → <span style="font-weight:1100">${m.hacia}</span>${m.nota?` · <span class="muted">${m.nota}</span>`:""}`;
      montoCls = "muted";
    }

    html += `<tr class="${m.anulado?'rowAnulada':''}">
      <td>${m.fecha}</td>
      <td style="font-weight:1100">${m.tipo}</td>
      <td>${det}</td>
      <td class="${montoCls}" style="font-weight:1100">${formatARS(m.monto)}</td>
    </tr>`;
  });
  html += `</table>`;
  document.getElementById("tablaMovHist").innerHTML = html;
}

/* =======================
   MAESTROS
======================= */
function renderMaestros(resetScroll){
  const cats = Object.keys(master.categorias);
  if(cats.length===0){
    master.categorias = {"Otros":["Varios"]};
  }
  fillSelectOptions(document.getElementById("mCatSelect"), Object.keys(master.categorias), false);

  renderListaMetodos();
  renderSubsCat();

  if(resetScroll){
    const sb = document.querySelector("#maestros .sectionBody");
    if(sb) sb.scrollTop = 0;
  }
}

function renderListaMetodos(){
  const wrap = document.getElementById("listaMetodos");
  let html = `<table class="table"><tr><th>Método</th><th>Acción</th></tr>`;
  master.metodos.forEach((m,idx)=>{
    html += `<tr>
      <td style="font-weight:1100">${m}</td>
      <td><button class="btn danger" onclick="eliminarMetodo(${idx})">Eliminar</button></td>
    </tr>`;
  });
  html += `</table>`;
  wrap.innerHTML = html;
}

function agregarMetodo(){
  const inp = document.getElementById("mNuevoMetodo");
  const val = (inp.value||"").trim();
  if(!val) return toast("Escribí un método");
  if(master.metodos.some(x=>x.toLowerCase()===val.toLowerCase())) return toast("Ya existe");
  master.metodos.push(val);
  inp.value="";
  saveAll();
  refreshSelects();

  // ✅ solo si es método balanceable lo agrego a real saldos
  if(val !== CHEQUE_METHOD){
    const real = getRealSaldos();
    if(real[val]===undefined) real[val]=0;
    setRealSaldos(real);
  }

  toast("Método agregado ✅");
  renderMaestros(false);
  renderDashboard();
}

function eliminarMetodo(idx){
  const m = master.metodos[idx];
  if(!m) return;
  const usado = movimientos.some(x=>
    (x.tipo==="VENTA" && x.metodo===m) ||
    (x.tipo==="GASTO" && x.estado==="PAGADO" && x.metodo===m) ||
    (x.tipo==="TRASPASO" && (x.desde===m || x.hacia===m))
  );
  if(usado) return toast("No se puede: método usado");
  if(!confirm(`¿Eliminar método "${m}"?`)) return;
  master.metodos.splice(idx,1);
  saveAll();
  refreshSelects();

  const real = getRealSaldos();
  delete real[m];
  setRealSaldos(real);

  toast("Eliminado ✅");
  renderMaestros(false);
  renderDashboard();
}

function agregarCategoria(){
  const inp = document.getElementById("mNuevaCat");
  const val = (inp.value||"").trim();
  if(!val) return toast("Escribí una categoría");
  if(master.categorias[val]) return toast("Ya existe");
  master.categorias[val] = [];
  inp.value="";
  saveAll();
  refreshSelects();
  toast("Categoría agregada ✅");
  renderMaestros(false);
  renderPendientes(false);
}

function renderSubsCat(){
  const cat = document.getElementById("mCatSelect").value;
  const subs = master.categorias[cat] || [];
  const wrap = document.getElementById("listaSubs");

  let html = `<table class="table"><tr><th>Subcategoría</th><th>Acción</th></tr>`;
  subs.forEach((s,idx)=>{
    html += `<tr>
      <td style="font-weight:1100">${s}</td>
      <td><button class="btn danger" onclick="eliminarSub('${escapeHtml(cat)}', ${idx})">Eliminar</button></td>
    </tr>`;
  });
  html += `</table>`;

  wrap.innerHTML = html;
}

function agregarSub(){
  const cat = document.getElementById("mCatSelect").value;
  const inp = document.getElementById("mNuevaSub");
  const val = (inp.value||"").trim();
  if(!cat) return toast("Elegí una categoría");
  if(!val) return toast("Escribí una subcategoría");
  const arr = master.categorias[cat] || (master.categorias[cat]=[]);
  if(arr.some(x=>x.toLowerCase()===val.toLowerCase())) return toast("Ya existe");
  arr.push(val);
  inp.value="";
  saveAll();
  refreshSelects();
  toast("Subcategoría agregada ✅");
  renderMaestros(false);
  renderPendientes(false);
}

function eliminarSub(cat, idx){
  if(!master.categorias[cat]) return;
  const sub = master.categorias[cat][idx];
  if(!sub) return;
  const usado = movimientos.some(x=> x.tipo==="GASTO" && x.categoria===cat && x.subcategoria===sub);
  if(usado) return toast("No se puede: usada en gastos");
  if(!confirm(`¿Eliminar "${sub}" de ${cat}?`)) return;
  master.categorias[cat].splice(idx,1);
  saveAll();
  refreshSelects();
  toast("Eliminada ✅");
  renderMaestros(false);
  renderPendientes(false);
}

function resetMaestrosDemo(){
  if(!confirm("¿Resetear Maestros al demo?")) return;
  master = structuredClone(DEFAULT_MASTER);

  refreshSelects();
  const real = {};
  metodosBalance().forEach(m=> real[m]=0);

/* Helpers */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
  }[m]));
}
/* =======================
   DASHBOARD (Cheque separado)
======================= */

// ✅ Saldos calculados SOLO de métodos balanceables (sin Cheque)
function calcBalances(){
  const calc = {};
  metodosBalance().forEach(m => calc[m]=0);

  activos().forEach(m=>{
    if(m.tipo==="VENTA"){
      // ventas: cheque ya no debería existir acá, pero igual lo ignoro por seguridad
      if(m.metodo === CHEQUE_METHOD) return;
      if(calc[m.metodo]===undefined) return;
      calc[m.metodo] = (calc[m.metodo]||0) + m.monto;
    }
    if(m.tipo==="GASTO" && m.estado==="PAGADO"){
      const met = m.metodo || "";
      // ✅ pagos con cheque NO afectan saldos disponibles
      if(met === CHEQUE_METHOD) return;
      if(calc[met]===undefined) return;
      calc[met] = (calc[met]||0) - m.monto;
    }
    if(m.tipo==="TRASPASO"){
      // cheque no debería estar en traspaso, igual lo ignoro
      if(m.desde && m.desde!==CHEQUE_METHOD && calc[m.desde]!==undefined) calc[m.desde] = (calc[m.desde]||0) - m.monto;
      if(m.hacia && m.hacia!==CHEQUE_METHOD && calc[m.hacia]!==undefined) calc[m.hacia] = (calc[m.hacia]||0) + m.monto;
    }
  });

  return calc;
}

// ✅ Cheques entregados: cantidad + total (según mes del dashboard)
function calcChequesEntregados(mes){
  let count = 0;
  let total = 0;

  activos().forEach(m=>{
    if(m.tipo!=="GASTO") return;
    if(m.estado!=="PAGADO") return;
    if((m.metodo||"") !== CHEQUE_METHOD) return;
    if(mes && !(m.fecha||"").startsWith(mes)) return;

    count += 1;
    total += m.monto;
  });

  return { count, total: round0(total) };
}

function setRealToCalc(){
  const calc = calcBalances();
  const real = {};
  metodosBalance().forEach(m=> real[m] = round0(calc[m]||0));
  setRealSaldos(real);
  toast("Real = Calculado ✅");
  renderDashboard();
}

function ensureChequeStatsUI(){
  const panel = document.querySelector("#dashboard .sectionBody .panel");
  if(!panel) return;

  // ya existe?
  if(document.getElementById("dChequesCount")) return;

  // inserto stats cheques debajo del grid principal (dentro del primer panel)
  const statGrid = panel.querySelector(".statGrid");
  if(!statGrid) return;

  const c1 = document.createElement("div");
  c1.className = "stat";
  c1.innerHTML = `<div class="k">Cheques entregados</div><div class="v badTxt" id="dChequesCount">0</div>`;

  const c2 = document.createElement("div");
  c2.className = "stat";
  c2.innerHTML = `<div class="k">Total cheques</div><div class="v badTxt" id="dChequesTotal">$ 0</div>`;

  statGrid.appendChild(c1);
  statGrid.appendChild(c2);
}

function renderDashboard(){
  const mes = document.getElementById("dashMes")?.value || "";

  let ventasMes=0, gastosPagMes=0;
  activos().forEach(m=>{
    const esMes = (!mes || (m.fecha||"").startsWith(mes));
    if(!esMes) return;
    if(m.tipo==="VENTA") ventasMes += m.monto;
    if(m.tipo==="GASTO" && m.estado==="PAGADO") gastosPagMes += m.monto; // acá incluye cheques, ok (igual es gasto pagado)
  });

  document.getElementById("dVentas").textContent = formatARS(ventasMes);
  document.getElementById("dGastos").textContent = formatARS(gastosPagMes);

  const res = ventasMes - gastosPagMes;
  const resEl = document.getElementById("dResultado");
  resEl.textContent = formatARS(res);
  resEl.className = "v " + (res>=0 ? "goodTxt" : "badTxt");

  // ✅ Cheques entregados (mes dashboard)
  ensureChequeStatsUI();
  const che = calcChequesEntregados(mes);
  document.getElementById("dChequesCount").textContent = String(che.count);
  document.getElementById("dChequesTotal").textContent = formatARS(che.total);

  const calc = calcBalances();
  const real = getRealSaldos();

  let html = `
  <table class="table">
    <tr>
      <th>Método</th>
      <th>Calculado</th>
      <th>Real (editable)</th>
      <th>Dif.</th>
    </tr>`;

  let sumCalc=0, sumReal=0;

  metodosBalance().forEach(m=>{
    const c = round0(calc[m]||0);
    const r = round0(real[m]||0);
    const dif = r - c;

    sumCalc += c;
    sumReal += r;

    const cCls = c===0 ? "muted" : (c>0 ? "goodTxt" : "badTxt");
    const dCls = dif===0 ? "muted" : (dif>0 ? "goodTxt" : "badTxt");

    html += `
      <tr>
        <td style="font-weight:1100">${m}</td>
        <td class="${cCls}" style="font-weight:1100">${formatARS(c)}</td>
        <td>
          <input
            class="money realSaldoInput"
            data-method="${m}"
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            placeholder="$ 0"
            value="${r!==0 ? formatARS(r) : ""}"
            title="Escribí el saldo real (ej: 1500000)"
          >
        </td>
        <td class="${dCls}" style="font-weight:1100">${formatARS(dif)}</td>
      </tr>`;
  });

  const sumCalcCls = sumCalc===0 ? "muted" : (sumCalc>0 ? "goodTxt" : "badTxt");
  const sumRealCls = sumReal===0 ? "muted" : (sumReal>0 ? "goodTxt" : "badTxt");
  const sumDif = sumReal - sumCalc;
  const sumDifCls = sumDif===0 ? "muted" : (sumDif>0 ? "goodTxt" : "badTxt");

  html += `
    <tr>
      <td style="font-weight:1100">TOTAL</td>
      <td class="${sumCalcCls}" style="font-weight:1100">${formatARS(sumCalc)}</td>
      <td class="${sumRealCls}" style="font-weight:1100">${formatARS(sumReal)}</td>
      <td class="${sumDifCls}" style="font-weight:1100">${formatARS(sumDif)}</td>
    </tr>
  </table>`;

  document.getElementById("tablaMetodos").innerHTML = html;

  const inputs = document.querySelectorAll(".realSaldoInput");
  inputs.forEach(inp=>{
    wireMoneyInput(inp);
    inp.addEventListener("blur", ()=>{
      const method = inp.dataset.method;
      const val = parseARS(inp.value);
      const realNow = getRealSaldos();
      realNow[method] = round0(val);
      setRealSaldos(realNow);
      toast("Saldo real guardado ✅");
      renderDashboard();
    });
  });
}

async function copiarResumenWhatsApp(){
  const mes = document.getElementById("dashMes")?.value || thisMonth();
  let ventasMes=0, gastosPagMes=0;

  activos().forEach(m=>{
    const esMes = (m.fecha||"").startsWith(mes);
    if(!esMes) return;
    if(m.tipo==="VENTA") ventasMes += m.monto;
    if(m.tipo==="GASTO" && m.estado==="PAGADO") gastosPagMes += m.monto;
  });

  const res = ventasMes - gastosPagMes;
  const che = calcChequesEntregados(mes);

  const txt =
`📌 *Stella Maris · ${mes}*
💰 Ventas: ${formatARS(ventasMes)}
💸 Gastos pagados: ${formatARS(gastosPagMes)}
🧾 Cheques entregados: ${che.count} (${formatARS(che.total)})
✅ Resultado: ${formatARS(res)}`;

  try{
    await navigator.clipboard.writeText(txt);
    toast("Copiado ✅");
  }catch{
    abrirModal("Resumen WhatsApp", `
      <div class="panel" style="margin:0">
        <textarea style="min-height:160px">${txt}</textarea>
      </div>
    `, "Cerrar");
    document.getElementById("modalFoot").innerHTML = `<button class="btn primary" onclick="cerrarModal()">Cerrar</button>`;
  }
}

/* =======================
   EXPORT / IMPORT
======================= */
function exportarDatos(){
  const data = { master, movimientos, realSaldos: getRealSaldos() };
  const texto = JSON.stringify(data, null, 2);

  navigator.clipboard.writeText(texto).then(()=>{
    toast("Exportado ✅ (copiado)");
  }).catch(()=>{
    abrirModal("Exportar", `
      <div class="panel" style="margin:0">
        <div class="muted" style="margin-bottom:10px">Copiá este texto y pegalo en el otro dispositivo.</div>
        <textarea style="min-height:260px">${texto}</textarea>
      </div>
    `, "Cerrar");
    document.getElementById("modalFoot").innerHTML = `<button class="btn primary" onclick="cerrarModal()">Cerrar</button>`;
  });
}

function importarDatos(){
  abrirModal("Importar (Reemplaza todo)", `
    <div class="panel" style="margin:0">
      <div class="muted" style="margin-bottom:10px">
        Pegá el JSON exportado. Esto reemplaza TODOS los datos actuales.
      </div>
      <textarea id="importJson" style="min-height:260px" placeholder="{ ... }"></textarea>
    </div>
  `, "Importar");

  document.getElementById("modalFoot").innerHTML = `
    <button class="btn" onclick="cerrarModal()">Cancelar</button>
    <button class="btn danger" onclick="confirmarImportacion()">Importar</button>
  `;
}

function confirmarImportacion(){
  const texto = (document.getElementById("importJson")?.value || "").trim();
  if(!texto) return toast("No hay datos");

  let data;
  try{ data = JSON.parse(texto); }
  catch{ return toast("JSON inválido"); }

  if(!data || typeof data!=="object") return toast("Formato inválido");
  if(!data.master || !Array.isArray(data.movimientos)) return toast("Faltan campos");

  if(!confirm("Esto reemplaza TODO. ¿Continuar?")) return;

  master = data.master;
  movimientos = data.movimientos;
  saveAll();

  if(data.realSaldos && typeof data.realSaldos==="object"){
    setRealSaldos(data.realSaldos);
  }else{
    const real = getRealSaldos();
    metodosBalance().forEach(m=>{ if(real[m]===undefined) real[m]=0; });
    setRealSaldos(real);
  }

  cerrarModal();
  toast("Importado ✅");

  refreshSelects();
  renderHome();
  renderDashboard();
  renderPendientes(false);
  renderVentasHist();
  renderMovHist();
}
